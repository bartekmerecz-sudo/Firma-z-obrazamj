<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Jost:wght@500;700&display=swap" rel="stylesheet">
<style>*{margin:0;box-sizing:border-box;font-family:"Jost",sans-serif}
.card{width:1080px;height:1920px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:50px;background:radial-gradient(120% 90% at 50% 30%,#343434,#161616);text-align:center;padding:80px}
.card h1{font-family:"Cormorant Garamond",serif;color:#fff;font-size:110px;line-height:1.08;font-weight:700}
.card h1 span{color:#d9a94a}
.card img{width:220px;height:220px}
.card .sub{color:#c9bfa8;font-size:44px}
.lab{width:700px;height:150px;display:flex;align-items:center;justify-content:center;background:rgba(20,20,20,.75);border:3px solid #d9a94a;border-radius:100px}
.lab span{font-family:"Cormorant Garamond",serif;color:#fff;font-size:72px;font-weight:700}
</style></head><body>
<div class="card" id="i1"><img src="../assets/logo/logo-icon.svg"><h1>Zamieniam zwykłe zdjęcia w <span>OBRAZY</span> 🎨</h1></div>
<div class="card" id="i2"><img src="../assets/logo/logo-icon.svg"><h1>1 zdjęcie<br>= <span>5 stylów</span> 😱</h1></div>
<div class="card" id="i3"><img src="../assets/logo/logo-icon.svg"><h1>Szukasz <span>prezentu</span>? 🎁</h1><div class="sub">który naprawdę zaskoczy</div></div>
<div class="card" id="i4"><img src="../assets/logo/logo-icon.svg"><h1>Tak wygląda <span>na ścianie</span> 😍</h1></div>
<div class="card" id="cta"><img src="../assets/logo/logo-icon.svg"><h1>Zamów swój<br><span>pixelpedzel.pl</span></h1><div class="sub">personalizowany obraz ze zdjęcia</div></div>
<div class="lab" id="l-olej"><span>Olej</span></div>
<div class="lab" id="l-vangogh"><span>Van Gogh</span></div>
<div class="lab" id="l-akwarela"><span>Akwarela</span></div>
<div class="lab" id="l-cyberpunk"><span>Cyberpunk</span></div>
<div class="lab" id="l-szkic"><span>Szkic ołówkiem</span></div>
<div class="lab" id="l-pastel"><span>Pastel</span></div>
<div class="lab" id="l-bajka"><span>Bajkowy 3D</span></div>
<div class="lab" id="l-mozaika"><span>Mozaika</span></div>
<div class="lab" id="l-kubizm"><span>Kubizm</span></div>
<div class="lab" id="l-wektor"><span>Wektor</span></div>
</body></html>
